<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>서울 식히기: 루버 제트 탭 배틀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght=500;600;700&family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg-void:#070b14;
    --bg-panel:#0e1626;
    --bg-panel-2:#131f36;
    --line:#1f2f4d;
    --heat-1:#00d9ff; /* 차가움 */
    --heat-3:#ffd60a;
    --heat-5:#ff7b00;
    --heat-6:#ff3040; /* 뜨거움 */
    --ok:#2dd4bf;
    --bad:#ff3040;
    --text-hi:#f3f6ff;
    --text-lo:#8a9bc0;
    --font-display:'Rajdhani', sans-serif;
    --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select: none;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 800px at 15% -10%, rgba(67,97,238,0.25), transparent 60%),
      radial-gradient(ellipse 1000px 700px at 110% 10%, rgba(255,48,64,0.18), transparent 55%),
      var(--bg-void);
    color:var(--text-hi);
    font-family:var(--font-body);
    min-height:100vh;
    overflow-x:hidden;
  }
  .screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 20px;
    position:relative;
  }
  .hidden{display:none !important;}

  /* ---------- shared bits ---------- */
  .eyebrow{
    font-family:var(--font-display);
    letter-spacing:0.22em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--heat-1);
    font-weight:600;
    margin-bottom:10px;
  }
  h1.title{
    font-family:var(--font-display);
    font-size:44px;
    font-weight:700;
    line-height:1.05;
    margin:0 0 6px;
    background:linear-gradient(90deg, var(--heat-1), var(--heat-5) 55%, var(--heat-6));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-align:center;
  }
  p.sub{
    color:var(--text-lo);
    font-size:15px;
    text-align:center;
    max-width:420px;
    margin:0 0 32px;
    line-height:1.6;
  }
  .card{
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border:1px solid var(--line);
    border-radius:20px;
    padding:24px;
    width:100%;
    max-width:440px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .btn{
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    letter-spacing:0.02em;
    border:none;
    border-radius:14px;
    padding:16px 20px;
    cursor:pointer;
    width:100%;
    transition:transform .12s ease, filter .12s ease;
    color:var(--bg-void);
  }
  .btn:active{transform:scale(0.97);}
  .btn:disabled{opacity:0.35; cursor:not-allowed;}
  .btn-hot{background:linear-gradient(90deg, var(--heat-5), var(--heat-6)); color:#fff;}
  .btn-cool{background:linear-gradient(90deg, var(--heat-1), #00a2ff); color:#031018;}
  .btn-ghost{
    background:transparent; border:1.5px solid var(--line); color:var(--text-hi);
  }
  .stack{display:flex; flex-direction:column; gap:14px; width:100%;}
  input[type=text]{
    font-family:var(--font-body);
    font-size:18px;
    padding:15px 16px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:var(--bg-void);
    color:var(--text-hi);
    width:100%;
    outline:none;
    text-align:center;
  }
  input:focus{border-color:var(--heat-1);}
  .err-msg{color:var(--heat-6); font-size:13px; text-align:center; min-height:18px;}

  /* ---------- role select ---------- */
  .role-grid{display:flex; flex-direction:column; gap:16px; width:100%; max-width:400px;}
  .role-card{
    background:var(--bg-panel); border:1.5px solid var(--line); border-radius:18px;
    padding:24px; text-align:left; cursor:pointer; transition:border-color .15s, transform .15s;
  }
  .role-card:active{transform:scale(0.98);}
  .role-card .emoji{font-size:34px; margin-bottom:8px; display:block;}
  .role-card h3{font-family:var(--font-display); font-size:21px; margin:0 0 4px;}
  .role-card p{color:var(--text-lo); font-size:13.5px; margin:0; line-height:1.5;}
  .role-card.host{border-color:rgba(255,123,0,0.35);}
  .role-card.player{border-color:rgba(0,217,255,0.35);}

  /* ---------- host lobby ---------- */
  .room-code{
    font-family:var(--font-display);
    font-size:64px;
    font-weight:700;
    letter-spacing:0.12em;
    color:var(--heat-3);
    text-align:center;
    margin:6px 0 2px;
    text-shadow:0 0 30px rgba(255,214,10,0.35);
  }
  .info-box{
    background:rgba(255,255,255,0.03);
    border:1.5px dashed var(--line);
    border-radius:16px;
    padding:20px;
    width:100%;
    max-width:440px;
    text-align:center;
    margin-bottom:20px;
  }
  .info-box span{
    display:block;
    font-family:var(--font-display);
    font-size:20px;
    color:var(--heat-1);
    font-weight:700;
    word-break: break-all;
    user-select: text;
    margin-top:6px;
  }
  .players-grid{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:16px 0; max-width:700px;
  }
  .player-chip{
    background:var(--bg-panel-2); border:1px solid var(--line); border-radius:999px;
    padding:8px 14px; font-size:13.5px; font-weight:600; color:var(--text-hi);
    display:flex; align-items:center; gap:6px;
  }
  .player-chip .dot{width:8px; height:8px; border-radius:50%; background:var(--ok);}
  .count-pill{
    font-family:var(--font-display); font-size:15px; color:var(--text-lo); margin-bottom:6px; text-align:center;
  }

  /* ---------- host play board ---------- */
  .play-stage{
    width:100%;
    max-width:800px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .timer-banner{
    font-family:var(--font-display);
    font-size:56px;
    font-weight:800;
    color:var(--heat-1);
    text-shadow:0 0 20px rgba(0,217,255,0.4);
    margin-bottom:12px;
  }
  .temp-display{
    font-family:var(--font-display);
    font-size:42px;
    font-weight:700;
    margin-bottom:20px;
    transition:color 0.3s;
  }
  /* 도시 온도 게이지 */
  .city-container{
    width:100%;
    background:rgba(255,255,255,0.03);
    border:2px solid var(--line);
    border-radius:24px;
    padding:24px;
    position:relative;
    overflow:hidden;
    margin-bottom:28px;
    text-align:center;
  }
  .city-bg-effect{
    position:absolute; inset:0;
    background:linear-gradient(0deg, rgba(255,48,64,0.1) 0%, transparent 80%);
    transition:opacity 0.5s;
    z-index:1;
  }
  .city-emoji{
    font-size:64px;
    position:relative;
    z-index:2;
